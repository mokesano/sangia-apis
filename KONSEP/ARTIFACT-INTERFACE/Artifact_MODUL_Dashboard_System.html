<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG Research Platform - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --info-color: #8e44ad;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #333;
        }

        /* ===== MAIN LAYOUT ===== */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(135deg, var(--secondary-color) 0%, #34495e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-brand {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .user-role {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-section {
            margin-bottom: 30px;
        }

        .nav-section-title {
            padding: 0 20px 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            font-weight: 600;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.active {
            background: var(--primary-color);
            color: white;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: white;
        }

        .nav-icon {
            width: 20px;
            margin-right: 15px;
            text-align: center;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* ===== HEADER ===== */
        .header {
            height: var(--header-height);
            background: white;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            align-items: center;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: #f8f9fa;
            color: var(--primary-color);
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-action {
            background: none;
            border: none;
            font-size: 18px;
            color: #666;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            position: relative;
            transition: all 0.3s ease;
        }

        .header-action:hover {
            background: #f8f9fa;
            color: var(--primary-color);
        }

        .notification-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== CONTENT AREA ===== */
        .content {
            padding: 30px;
        }

        /* ===== DASHBOARD WIDGETS ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .widget {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid #e1e8ed;
        }

        .widget:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
        }

        .widget-header {
            display: flex;
            align-items: center;
            justify-content: between;
            margin-bottom: 20px;
        }

        .widget-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .widget-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .widget-action {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .widget-action:hover {
            background: #f8f9fa;
            color: var(--primary-color);
        }

        /* Stat widgets */
        .stat-widget {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .stat-change {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .stat-change.positive {
            color: var(--success-color);
        }

        .stat-change.negative {
            color: var(--danger-color);
        }

        /* Chart widgets */
        .chart-widget {
            height: 300px;
        }

        .chart-container {
            height: 100%;
            width: 100%;
        }

        /* Recent activity widget */
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 14px;
            color: white;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .activity-time {
            font-size: 12px;
            color: #666;
        }

        /* Quick actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .quick-action {
            background: white;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .quick-action:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.2);
        }

        .quick-action-icon {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .quick-action-label {
            font-weight: 600;
            font-size: 14px;
        }

        /* Role-specific styling */
        .role-admin .widget-icon { background: var(--danger-color); }
        .role-researcher .widget-icon { background: var(--primary-color); }
        .role-institution .widget-icon { background: var(--info-color); }
        .role-government .widget-icon { background: var(--success-color); }
        .role-industry .widget-icon { background: var(--warning-color); }
        .role-public .widget-icon { background: #95a5a6; }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.show {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .content {
                padding: 20px;
            }
        }

        /* ===== LOADING STATES ===== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        class Dashboard {
            constructor() {
                this.currentUser = null;
                this.apiManager = new APIManager();
                this.initializeElements();
                this.bindEvents();
                this.loadUserData();
            }

            initializeElements() {
                this.sidebar = document.getElementById('sidebar');
                this.mainContent = document.getElementById('mainContent');
                this.sidebarToggle = document.getElementById('sidebarToggle');
                this.sidebarNav = document.getElementById('sidebarNav');
                this.userAvatar = document.getElementById('userAvatar');
                this.userName = document.getElementById('userName');
                this.userRole = document.getElementById('userRole');
                this.quickActions = document.getElementById('quickActions');
                this.dashboardGrid = document.getElementById('dashboardGrid');
                this.pageTitle = document.getElementById('pageTitle');
            }

            bindEvents() {
                this.sidebarToggle.addEventListener('click', () => this.toggleSidebar());
                
                // Close sidebar on mobile when clicking outside
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        if (!this.sidebar.contains(e.target) && !this.sidebarToggle.contains(e.target)) {
                            this.sidebar.classList.remove('show');
                        }
                    }
                });

                // Handle resize
                window.addEventListener('resize', () => this.handleResize());
            }

            toggleSidebar() {
                if (window.innerWidth <= 768) {
                    this.sidebar.classList.toggle('show');
                } else {
                    this.sidebar.classList.toggle('collapsed');
                    this.mainContent.classList.toggle('expanded');
                }
            }

            handleResize() {
                if (window.innerWidth > 768) {
                    this.sidebar.classList.remove('show');
                }
            }

            async loadUserData() {
                try {
                    // Simulate API call to get current user
                    const userData = await this.apiManager.getCurrentUser();
                    this.currentUser = userData;
                    this.initializeDashboard();
                } catch (error) {
                    console.error('Failed to load user data:', error);
                    // Fallback for demo
                    this.currentUser = {
                        id: 1,
                        name: 'John Doe',
                        email: 'john.doe@example.com',
                        role: 'researcher',
                        avatar: null
                    };
                    this.initializeDashboard();
                }
            }

            initializeDashboard() {
                const config = ROLE_CONFIGS[this.currentUser.role];
                
                // Set user info
                this.userName.textContent = this.currentUser.name;
                this.userRole.textContent = config.name || this.currentUser.role;
                this.userAvatar.textContent = this.getInitials(this.currentUser.name);
                this.userAvatar.style.background = config.color;
                
                // Add role class to body
                document.body.className = `role-${this.currentUser.role}`;
                
                // Build navigation
                this.buildNavigation(config.navigation);
                
                // Build quick actions
                this.buildQuickActions(config.quickActions);
                
                // Build widgets
                this.buildWidgets(config.widgets);
                
                // Update page title
                this.pageTitle.textContent = `${config.name || 'Dashboard'}`;
            }

            getInitials(name) {
                return name.split(' ').map(n => n[0]).join('').toUpperCase();
            }

            buildNavigation(navConfig) {
                this.sidebarNav.innerHTML = '';
                
                navConfig.forEach(section => {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'nav-section';
                    
                    const titleEl = document.createElement('div');
                    titleEl.className = 'nav-section-title';
                    titleEl.textContent = section.section;
                    sectionEl.appendChild(titleEl);
                    
                    section.items.forEach(item => {
                        const navItem = document.createElement('div');
                        navItem.className = 'nav-item';
                        
                        const navLink = document.createElement('a');
                        navLink.className = `nav-link ${item.active ? 'active' : ''}`;
                        navLink.href = item.url;
                        navLink.innerHTML = `
                            <i class="nav-icon ${item.icon}"></i>
                            ${item.label}
                        `;
                        
                        navItem.appendChild(navLink);
                        sectionEl.appendChild(navItem);
                    });
                    
                    this.sidebarNav.appendChild(sectionEl);
                });
            }

            buildQuickActions(actions) {
                this.quickActions.innerHTML = '';
                
                actions.forEach(action => {
                    const actionEl = document.createElement('div');
                    actionEl.className = 'quick-action';
                    actionEl.innerHTML = `
                        <div class="quick-action-icon">
                            <i class="${action.icon}"></i>
                        </div>
                        <div class="quick-action-label">${action.label}</div>
                    `;
                    
                    actionEl.addEventListener('click', () => this.handleQuickAction(action.action));
                    this.quickActions.appendChild(actionEl);
                });
            }

            buildWidgets(widgets) {
                this.dashboardGrid.innerHTML = '';
                
                widgets.forEach(widget => {
                    const widgetEl = this.createWidget(widget);
                    this.dashboardGrid.appendChild(widgetEl);
                });
            }

            createWidget(config) {

                widget.className = 'widget';

        // =================================================================
        // API MANAGER
        // =================================================================
        
        class APIManager {
            constructor() {
                this.baseUrl = '/api';
                this.apis = {
                    sdg_classification: '/sdg-analysis.php',
                    scopus_journal: '/scopus-journal.php',
                    sinta_journal: '/sinta-journal.php',
                    scopus_author: '/scopus-author.php',
                    orcid_profile: '/orcid-profile.php',
                    citation_analysis: '/citation-analysis.php',
                    trend_analysis: '/trend-analysis.php',
                    policy_recommendations: '/policy-recommendations.php',
                    image_resize: '/image-resize.php'
                };
            }

            async callAPI(apiName, params = {}) {
                try {
                    const url = this.baseUrl + this.apis[apiName];
                    const queryString = new URLSearchParams(params).toString();
                    const fullUrl = queryString ? `${url}?${queryString}` : url;
                    
                    const response = await fetch(fullUrl);
                    const data = await response.json();
                    
                    return { success: true, data };
                } catch (error) {
                    console.error(`API call failed for ${apiName}:`, error);
                    return { success: false, error: error.message };
                }
            }

            async getCurrentUser() {
                // Simulate API call to get current user session
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve({
                            id: 1,
                            name: 'Dr. John Doe',
                            email: 'john.doe@university.edu',
                            role: 'researcher',
                            orcid: '0000-0002-1825-0097',
                            institution: 'University of Excellence'
                        });
                    }, 500);
                });
            }

            async getAPIStatus() {
                const statusPromises = Object.keys(this.apis).map(async (apiName) => {
                    try {
                        const result = await this.callAPI(apiName, { status: 'check' });
                        return { api: apiName, status: result.success ? 'online' : 'offline' };
                    } catch {
                        return { api: apiName, status: 'offline' };
                    }
                });

                return Promise.all(statusPromises);
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Clear session and redirect
                localStorage.removeItem('session_token');
                sessionStorage.clear();
                window.location.href = '/auth/login.php';
            }
        }

        function showNotification(message, type = 'info') {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                ${message}
                <button onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            // Add to page
            document.body.appendChild(notification);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }
