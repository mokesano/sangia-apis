name: Build Production Branch

on:
  push:
    branches: [master]

concurrency:
  group: production-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP & Build
        uses: shivammathur/setup-php@v2
        with: { php-version: '8.2', tools: composer:v2 }
      - run: composer install --no-dev --optimize-autoloader

      - name: Purge Dev Files
        run: |
          rm -rf .github/ tests/
          rm -f .gitattributes .gitignore .gitkeep phpunit.xml phpunit.xml.dist

      - name: Push to Production Branch
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add -A
          git commit -m "Production build" || echo "No changes"
          git push --force origin HEAD:production
