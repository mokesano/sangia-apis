# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Psalm Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '32 15 * * 1'

permissions:
  contents: read

jobs:
  php-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⬇️ Tambahkan setup PHP dan Composer agar Psalm bisa membaca seluruh kode
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'                # Sesuaikan dengan versi PHP di proyek Anda
          extensions: mbstring, xml, json   # Pastikan ekstensi yang dibutuhkan ada
          tools: composer

      - name: Install dependensi
        run: composer install --no-interaction --prefer-dist

      - name: Psalm Security Scan
        uses: psalm/psalm-github-security-scan@f3e6fd9432bc3e44aec078572677ce9d2ef9c287
        # Aksi ini sudah diarsipkan; jika suatu saat gagal, gunakan alternatif di bawah
        # continue-on-error: true   # Bisa diaktifkan agar workflow tidak gagal total

      - name: Upload Security Analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif